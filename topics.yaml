# Список доступных тем для taskforge.
# Тот же список захардкожен в bin/taskforge (TOPICS) — этот файл для документации.

topics:
  - slug: code-block
    title: Писать код с нуля — один блок
    hint: Одна функция / класс / алгоритм. ~30-100 строк.

  - slug: code-project
    title: Писать с нуля небольшой проект по плану
    hint: 5-10 файлов, минимальная архитектура. Сначала план, потом код.

  - slug: bug-block
    title: Баг / оптимизация / синтаксис в одном блоке кода
    hint: Дан код с проблемой — найти, объяснить, исправить.

  - slug: bug-project
    title: Баг / оптимизация / синтаксис в проекте
    hint: Дан мини-проект с багом — локализовать, объяснить, исправить.

  - slug: web-search
    title: Веб-поиск релевантного / актуального ответа
    hint: Вопрос требует реальных данных. Executor может использовать WebFetch/WebSearch.

  - slug: tools
    title: Работа с инструментами
    hint: Задача требует комбинирования нескольких tool calls (Bash, Read, etc.)

  - slug: planning
    title: Планирование
    hint: Сделать пошаговый план по сложной задаче. Без кода.

  - slug: math-analysis
    title: Математический анализ
    hint: Производные, интегралы, ряды, пределы. С выкладками и обоснованием.

  - slug: higher-math
    title: Высшая математика
    hint: Линейная алгебра, дискретка, теория чисел, комбинаторика, теорвер.

  - slug: logic
    title: Логика
    hint: Логические задачи, формальная логика, рассуждения, парадоксы.
